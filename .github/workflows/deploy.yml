name: Build and Deploy Laravel Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo, pdo_mysql

      - name: Install composer dependencies
        run: |
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Skip `.env` generation
        run: |
          echo "Skipping .env generation in CI by request."
          echo "Make sure your production server has environment variables configured (via host control panel, systemd, or server-side .env)."
          echo "This workflow will only deploy application code."

      - name: Optimize framework
        run: |
          php artisan key:generate --ansi --no-interaction || true
          php artisan config:cache --no-interaction || true

      - name: Prepare list of files to exclude (for FTP)
        run: |
          echo "Excluding .git, .github, node_modules, tests, .env, storage/framework/cache, storage/logs"

      - name: Deploy to server via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_DEST }}
          protocol: ftp
          exclude: |
            .git*
            .github/*
            node_modules/*
            frontend/*
            tests/*
            .env
            storage/framework/cache/*
            storage/logs/*
            vendor/bin/*

      - name: Run migrations on remote server (optional)
        run: |
          set -euo pipefail
          if [ "${{ secrets.RUN_MIGRATIONS }}" = "true" ]; then
            if [ -z "${{ secrets.SSH_USER }}" ] || [ -z "${{ secrets.SSH_HOST }}" ] || [ -z "${{ secrets.SSH_APP_PATH }}" ]; then
              echo "RUN_MIGRATIONS requested but SSH info missing. Skipping migrations."
              exit 0
            fi
            echo "Running migrations on remote server (make sure server env/config is set)"
            ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ${{ secrets.SSH_APP_PATH }} && php artisan migrate --force"
          else
            echo "RUN_MIGRATIONS is not 'true' — skipping migrations"
          fi
